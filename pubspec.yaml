name: timer
description: "Timer - A Flutter task management app with Firebase auth and Firestore."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  firebase_messaging: ^15.1.3
  google_fonts: ^6.2.1
  table_calendar: ^3.1.2
  shimmer: ^3.0.0
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  shared_preferences: ^2.3.3
  intl: ^0.19.0
  uuid: ^4.5.1
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/icon/timer.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/timer.png"
  min_sdk_android: 21
