org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Works around a Kotlin incremental-compiler crash on Windows when the
# project and the pub-cache live on different drive letters (relativeTo()
# can't compute a relative path across drive roots).
kotlin.incremental=false
